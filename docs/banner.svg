<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" fill="none" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2997ff"/>
      <stop offset="1" stop-color="#0055d4"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9fc7ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="330" rx="24" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="329" rx="23.5" fill="none" stroke="#1e2a3d"/>

  <!-- Logo mark -->
  <g transform="translate(80 92)">
    <rect width="146" height="146" rx="36" fill="url(#mark)"/>
    <path d="M73 30l30 12v22c0 21-15 34-30 44c-15-10-30-23-30-44V42z" fill="none" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
    <path d="M57 71l11 11 21-22" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="268" y="132" font-size="66" font-weight="700" letter-spacing="-1.5" fill="url(#title)">RepoArk</text>
  <text x="270" y="176" font-size="25" font-weight="500" fill="#8aa2c0">Kendi sunucunda çalışan GitHub yedekleme paneli</text>

  <!-- Feature pills -->
  <g font-size="17" font-weight="600">
    <g transform="translate(270 210)">
      <rect width="196" height="38" rx="19" fill="#132033" stroke="#24344d"/>
      <text x="20" y="25" fill="#cfe0f5">Artımlı yedekleme</text>
    </g>
    <g transform="translate(478 210)">
      <rect width="168" height="38" rx="19" fill="#132033" stroke="#24344d"/>
      <text x="20" y="25" fill="#cfe0f5">Sürüm geçmişi</text>
    </g>
    <g transform="translate(658 210)">
      <rect width="150" height="38" rx="19" fill="#132033" stroke="#24344d"/>
      <text x="20" y="25" fill="#cfe0f5">S3 · NAS</text>
    </g>
    <g transform="translate(820 210)">
      <rect width="132" height="38" rx="19" fill="#132033" stroke="#24344d"/>
      <text x="20" y="25" fill="#cfe0f5">15 dil</text>
    </g>
    <g transform="translate(270 260)">
      <rect width="176" height="38" rx="19" fill="#132033" stroke="#24344d"/>
      <text x="20" y="25" fill="#cfe0f5">Tek Docker imajı</text>
    </g>
    <g transform="translate(458 260)">
      <rect width="150" height="38" rx="19" fill="#132033" stroke="#24344d"/>
      <text x="20" y="25" fill="#cfe0f5">CasaOS</text>
    </g>
    <g transform="translate(620 260)">
      <rect width="188" height="38" rx="19" fill="#132033" stroke="#24344d"/>
      <text x="20" y="25" fill="#cfe0f5">Açık / koyu tema</text>
    </g>
  </g>

  <!-- Right accent shields -->
  <g opacity="0.14" transform="translate(1010 70)">
    <path d="M95 0l95 38v70c0 66-47 107-95 137C47 215 0 174 0 108V38z" fill="none" stroke="#2997ff" stroke-width="4"/>
  </g>
</svg>
