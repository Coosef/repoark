name: Publish Docker image

# Builds the single RepoArk image for Intel (amd64) and ARM (arm64) and
# publishes it to GitHub Container Registry so it can be installed anywhere
# (CasaOS, NAS, a plain server) without building from source.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: ver
        run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.v }}
          tags: |
            ghcr.io/coosef/repoark:latest
            ghcr.io/coosef/repoark:${{ steps.ver.outputs.v }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
